name: Render Profile Donut

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - README.md
      - scripts/render_donut_gif.py
      - .github/workflows/render-profile-donut.yml
  schedule:
    - cron: "0 12 * * 1"

permissions:
  contents: write

jobs:
  render:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pillow

      - name: Render donut GIF
        run: python scripts/render_donut_gif.py

      - name: Commit updated asset
        run: |
          if git diff --quiet -- assets/spinning-donut.gif; then
            echo "No asset changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/spinning-donut.gif
          git commit -m "Update profile donut"
          git push
